services:
  - type: web
    name: mobile-app-suite
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false   # set manually in Render dashboard
