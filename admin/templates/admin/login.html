<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080b14; --surface: #0e1220; --elevated: #151c2e;
      --border: rgba(255,255,255,0.09); --text: #eef0f8; --muted: #6b7499;
      --green: #22c55e; --yellow: #eab308; --blue: #3b82f6;
      --orange: #f97316; --red: #ef4444;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-wrap {
      width: 100%; max-width: 420px; padding: 24px;
    }
    .login-logo {
      text-align: center; margin-bottom: 32px;
    }
    .login-logo-icon {
      width: 72px; height: 72px; border-radius: 20px; margin: 0 auto 16px;
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      display: flex; align-items: center; justify-content: center; font-size: 34px;
      box-shadow: 0 8px 32px rgba(59,130,246,0.4);
    }
    .login-logo-title {
      font-size: 22px; font-weight: 900; letter-spacing: -.5px;
      background: linear-gradient(90deg, #3b82f6, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .login-logo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #3b82f6, #a855f7);
    }
    .input-group { margin-bottom: 18px; }
    .input-label {
      display: block; font-size: 11px; font-weight: 700; color: var(--muted);
      margin-bottom: 7px; text-transform: uppercase; letter-spacing: .7px;
    }
    .input {
      width: 100%; background: var(--elevated);
      border: 1.5px solid var(--border); border-radius: 11px;
      color: var(--text); font-size: 15px; padding: 13px 16px; outline: none;
      transition: border-color .2s, box-shadow .2s; font-family: inherit;
    }
    .input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.18);
    }
    .btn-login {
      width: 100%; height: 52px; border: none; border-radius: 13px;
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      color: #fff; font-size: 16px; font-weight: 800;
      cursor: pointer; font-family: inherit; letter-spacing: -.2px;
      box-shadow: 0 4px 20px rgba(59,130,246,.4);
      transition: box-shadow .2s, transform .1s;
    }
    .btn-login:hover { box-shadow: 0 6px 28px rgba(59,130,246,.55); }
    .btn-login:active { transform: scale(0.97); }
    .flash-msg {
      padding: 12px 16px; border-radius: 10px; font-size: 14px;
      margin-bottom: 18px;
      background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3);
      color: #f87171;
    }
    .default-hint {
      margin-top: 20px; padding: 12px 16px; border-radius: 10px;
      background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2);
      font-size: 12px; color: var(--muted); line-height: 1.6;
    }
    .default-hint strong { color: var(--text); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-logo-icon">⚙️</div>
    <div class="login-logo-title">Admin Panel</div>
    <div class="login-logo-sub">Restricted access — authorised personnel only</div>
  </div>

  <div class="login-card">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash-msg">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin.do_login') }}">
      <div class="input-group">
        <label class="input-label" for="username">Username</label>
        <input class="input" id="username" name="username" type="text"
               placeholder="admin" autocomplete="username" required>
      </div>
      <div class="input-group" style="margin-bottom:24px">
        <label class="input-label" for="password">Password</label>
        <input class="input" id="password" name="password" type="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button class="btn-login" type="submit">🔐 Sign In</button>
    </form>

    <div class="default-hint">
      Default credentials: <strong>admin</strong> / <strong>admin123</strong><br>
      Change your password immediately after first login.
    </div>
  </div>
</div>
</body>
</html>
